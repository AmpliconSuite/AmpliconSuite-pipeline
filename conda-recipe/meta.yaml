{% set name="ampliconsuite" %}
{% set AS_version="1.5.3" %}
{% set AA_version="1.5.r7" %}
{% set AC_version="1.5.2" %}
{% set BFBA_version="1.0.1" %}

package:
    name: {{ name }}
    version: {{ AS_version }}

source:
    # the sha256 sum is generated by running the following on the release .tar.gz from Github.
    # $ wget -O- [URL] | shasum -a 256
    - url: https://github.com/AmpliconSuite/AmpliconSuite-pipeline/archive/v{{ AS_version }}.tar.gz
      sha256: 7db92d6cc2a1f3074877079e868dd8b16163858d6ef2d0fdc6d5a8e1b4588dbb
    - url: https://github.com/AmpliconSuite/AmpliconArchitect/archive/v{{ AA_version }}.tar.gz
      sha256: 4149f9db0cc8c8479f61f8189bb8ec40ea387eff51b5d55d874d632b9f219b69
      folder: ampliconarchitectlib
    - url: https://github.com/AmpliconSuite/AmpliconClassifier/archive/v{{ AC_version }}.tar.gz
      sha256: d12094407bf43dc102b3f3979d1ef154cf729146d59c699dfe31ce50df1e8f17
      folder: ampliconclassifierlib
    - url: https://github.com/AmpliconSuite/BFBArchitect/archive/v{{ BFBA_version }}.tar.gz
      sha256: 704ddd69756d9bb1414191dcce19bc2114d2b146660d17ff3bd8deb8f6fab94f
      folder: bfbarchitectlib
      patches:
        - bfba-conda-solvers.patch
build:
    noarch: python
    number: 0
    run_exports:
        - {{ pin_subpackage(name, max_pin="x") }}

requirements:
    build:
        - python >=3.9
        - pip
        - setuptools >=77
        - wheel
    run:
        - python >=3.9
        # Gurobi and Mosek bindings are mandatory in supported consumer
        # installations but come from vendor channels unavailable to Bioconda
        # CI. install.sh --finalize_only enforces Gurobi after installation.
        - bwa
        - clarabel >=0.11.1,<0.12
        - cnvkit >=0.9.10
        - coin-or-cbc
        - curl
        - Flask
        - future
        - intervaltree
        - matplotlib-base
        - mscorefonts
        - numpy
        - pandas
        - pulp >=2.8
        - pysam
        - samtools
        - scipy
        - bedtools
    host:
        - python >=3.9
        - pip
        - setuptools >=77
        - wheel

test:
    commands:
    - python3 $(which AmpliconSuite-pipeline.py) -v
    - python3 $(which GroupedAnalysisAmpSuite.py) -v
    - python3 $(which amplicon_classifier.py) -v
    - python3 $(which feature_similarity.py) -h
    - python3 $(which make_results_table.py) -h
    - BFBArchitect.py --version
    - python3 -c "import bfbarchitect; assert bfbarchitect.__version__ == '{{ BFBA_version }}'"
    - python3 -c "from importlib.metadata import requires; assert any(r.lower().startswith('gurobipy') for r in requires('BFBArchitect'))"
    - python3 -c "from importlib.metadata import version; assert version('AmpliconClassifier') == '{{ AC_version }}'"
    - python3 -c "from pulp import COIN_CMD; assert COIN_CMD().available()"
    - python3 -c "from bfbarchitect.BFBSolver import reconstruct_BFB_cbc; sequence, objective = reconstruct_BFB_cbc([2], [0], [0], 1, max_time=30, max_threads=1); assert sequence and objective is not None"
    imports:
    - paalib
    - ampliconarchitectlib
    - ampclasslib
    - bfbarchitect

about:
    home: https://github.com/AmpliconSuite
    license: BSD 2-Clause License (AmpliconSuite-pipeline and AmpliconClassifier), BSD 3-Clause License (BFBArchitect), and University of California Software License (AmpliconArchitect). Please see https://github.com/AmpliconSuite/AmpliconSuite-pipeline for more details on licenses.
    summary: An end-to-end wrapper for focal amplification analysis from whole-genome sequencing using AmpliconArchitect and associated tools.
